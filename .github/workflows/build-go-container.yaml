name: Build GO container
on:
  workflow_call:
    secrets:
      QUAY_USERNAME:
        required: false
      QUAY_TOKEN:
        required: false
  workflow_dispatch:
    inputs:
      deploy_stage:
        description: 'Deploy to stage'
        type: choice
        options:
          - skip
          - approve
      deploy_prod:
        description: 'Deploy to prod'
        type: choice
        options:
          - skip
          - approve

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release:
    uses: Cloud-for-You/github-workflows/.github/workflows/release-please.yaml@main

  build-dev-docker-image:
    runs-on: ubuntu-latest
    needs:
      - release
    if: github.ref != 'refs/heads/main'
    strategy:
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Set cache name
        id: cache-name
        run: |
          echo "cache-name=${{ needs.release.outputs.project }}-cache-${{ matrix.platform }}-${{ github.run_id }}" | sed 's:/:-:g' >> $GITHUB_OUTPUT
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          tags: ${{ needs.release.outputs.project }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=local,dest=/tmp/${{ needs.release.outputs.project }}-cache-${{ github.run_id }},mode=max
      - name: Upload cache
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.cache-name.outputs.cache-name }}
          path: /tmp/${{ needs.release.outputs.project }}-cache-${{ github.run_id }}
          if-no-files-found: error
          retention-days: 1
    
  build-release-docker-image:
    runs-on: ubuntu-latest
    needs:
      - release
    if: ${{ needs.release.outputs.release_created == 'true' }}
    strategy:
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Set cache name
        id: cache-name
        run: |
          echo "cache-name=${{ needs.release.outputs.project }}-cache-${{ matrix.platform }}-${{ github.run_id }}" | sed 's:/:-:g' >> $GITHUB_OUTPUT
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          tags: ${{ needs.release.outputs.project }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=local,dest=/tmp/${{ needs.release.outputs.project }}-cache-${{ github.run_id }},mode=max
      - name: Upload cache
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.cache-name.outputs.cache-name }}
          path: /tmp/${{ needs.release.outputs.project }}-cache-${{ github.run_id }}
          if-no-files-found: error
          retention-days: 1

  publish:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    needs:
      - release
      - build-release-docker-image
      - build-dev-docker-image
    if: ${{ always() && !failure() && !cancelled() && ((contains(fromJSON('["success"]'), needs.build-release-docker-image.result) || contains(fromJSON('["success"]'), needs.build-dev-docker-image.result))) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Download cache
        uses: actions/download-artifact@v8
        with:
          path: /tmp/${{ needs.release.outputs.project }}-cache
      - name: Set docker tag
        id: set_tag
        run: |
          if [[ "${{ needs.build-release-docker-image.result }}" == "success" ]]; then
            echo "TAG=type=semver,pattern={{version}},value=${{ needs.release.outputs.release_tag_name }}" >> $GITHUB_ENV
          else
            echo "TAG=type=sha,enable=true,priority=100,prefix=sha-,suffix=,format=short" >> $GITHUB_ENV
          fi
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            quay.io/${{ needs.release.outputs.organization }}/${{ needs.release.outputs.project }}
          tags: |
            ${{ env.TAG }}
      - name: Login to QUAY.IO
        uses: docker/login-action@v2
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: |
            linux/amd64
            linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=gha,mode=max

  code-quality:
    runs-on: ubuntu-latest
    needs:
      - publish
    if: always() && !failure() && !cancelled() && (contains(fromJSON('["success"]'), needs.publish.result))
    steps:
      - name: Vulnerability scan [table format]
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: image
          image-ref: ${{ needs.publish.outputs.image }}
          format: "table"

  deploy-dev:
    runs-on: ubuntu-latest
    needs:
      - publish
    if: always() && !failure() && !cancelled() && (contains(fromJSON('["success"]'), needs.publish.result))
    steps:
      - name: Show image
        run: |
          echo "Built image: ${{ needs.publish.outputs.image }}"

  deploy-stage:
    runs-on: ubuntu-latest
    needs:
      - publish
      - code-quality
    if: ${{ github.event_name == 'workflow_dispatch' && (inputs.deploy_stage == 'approve') }}
    steps:
      - name: Deploy to stage
        run: |
          echo "Deploying to stage: ${{ needs.publish.outputs.image }}"

  deploy-prod:
    runs-on: ubuntu-latest
    needs:
      - publish
      - code-quality
    if: ${{ github.event_name == 'workflow_dispatch' && (inputs.deploy_prod == 'approve') }}
    steps:
      - name: Deploy to prod
        run: |
          echo "Deploying to prod: ${{ needs.publish.outputs.image }}"
      #- name: SARIF generator
      #  uses: aquasecurity/trivy-action@0.35.0
      #  with:
      #    scan-type: image
      #    image-ref: ${{ needs.release.outputs.project }}:${{ github.sha }}
      #    format: "sarif"
      #    output: /tmp/${{ needs.setup.outputs.project-name }}-sarif
      #- name: Save vulnerability summary
      #  uses: github/codeql-action/upload-sarif@v4
      #  with:
      #    sarif_file: /tmp/${{ needs.setup.outputs.project-name }}-sarif